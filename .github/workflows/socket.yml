# Socket supply-chain scan (PR + push). Requires SOCKET_SECURITY_API_KEY.
# Docs: https://docs.socket.dev/docs/socket-for-github-actions
# Policy allowlist: SECURITY.md → "Socket policy (this repo)"
name: socket-security

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: socket-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  socket-security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Check for Socket API key
        id: auth
        run: |
          if [ -n "${{ secrets.SOCKET_SECURITY_API_KEY }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SOCKET_SECURITY_API_KEY not set; Socket CLI scan skipped. GitHub app comments may still apply. Add the secret to enable CI gating."
          fi

      - uses: actions/checkout@v7
        if: steps.auth.outputs.configured == 'true'
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 2 || 0 }}

      - uses: actions/setup-python@v5
        if: steps.auth.outputs.configured == 'true'
        with:
          python-version: "3.12"

      - name: Install Socket CLI
        if: steps.auth.outputs.configured == 'true'
        run: pip install socketsecurity --upgrade

      - name: Run Socket Security scan
        if: steps.auth.outputs.configured == 'true'
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=0
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi
          socketcli \
            --target-path "$GITHUB_WORKSPACE" \
            --scm github \
            --pr-number "$PR_NUMBER"
