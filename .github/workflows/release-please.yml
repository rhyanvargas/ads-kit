# Opens/updates a Release PR from Conventional Commits; merges cut the GitHub Release + tag.
# Docs: https://github.com/googleapis/release-please-action
# Runbook: docs/RELEASE.md (failures, manual refresh, cron fallback)
name: release-please

on:
  push:
    branches:
      - main
  # Fallback when push-triggered runs fail on transient GitHub API errors (503).
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
