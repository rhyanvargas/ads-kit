# Tier 1 hard gate: skills-ref validate + eval harness integrity (no LLM calls).
# Spec: .cursor/docs/specs/skill-eval-ci.md
name: skills-ci

# No path filters: branch protection requires job `tier1`. Path-filtered
# workflows never report status on unrelated PRs (e.g. release-please), so
# those PRs stay blocked on "Expected — Waiting for status to be reported."
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  tier1:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high

      - name: Tier 1 skill gates
        run: ./scripts/check-skills-ci.sh

      - name: Self-test (fixture mutations)
        run: ./scripts/check-skills-ci.sh --self-test
