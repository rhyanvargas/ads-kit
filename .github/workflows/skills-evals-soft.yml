# Tier 2 soft signal: scheduled / manual with_skill vs without_skill evals.
# Does NOT run on PRs. Must not be a required status check. Does not block release-please.
# Spec: .cursor/docs/specs/skill-eval-ci.md
# Runbook: docs/evaluating-skills.md (Tier 2 section)
name: skills-evals-soft

on:
  schedule:
    # Mondays 15:00 UTC
    - cron: "0 15 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tier2-stub:
    runs-on: ubuntu-latest
    # Soft signal only — missing secrets / incomplete automation must not fail required gates.
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Tier 2 runbook notice
        run: |
          set -euo pipefail
          {
            echo "# Tier 2 soft evals (v1 stub)"
            echo
            echo "Full with_skill vs without_skill agent loops are not automated in Actions yet."
            echo "Follow the runbook in docs/evaluating-skills.md (Tier 2), then paste"
            echo "pass-rate / token deltas into docs/evals/SCORECARD.md."
            echo
            echo "This workflow is intentionally soft (continue-on-error)."
            echo "Do not add it as a required PR check; SCORECARD numbers come from Tier 2, not Tier 1."
          } | tee tier2-summary.md

      - name: Upload summary artifact
        uses: actions/upload-artifact@v7
        with:
          name: tier2-eval-summary
          path: tier2-summary.md
          if-no-files-found: error
