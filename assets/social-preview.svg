<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="t d">
  <title id="t">Agentic Development Starter Kit</title>
  <desc id="d">Adopt agent skills, Cursor commands, and team profiles — versioned in your repo.</desc>

  <defs>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" fill="none" stroke="#E7E7E3" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#F5F5F2"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- ===== Header: logo + wordmark, centered as one block ===== -->
  <!-- block width: 212 logo + 32 gap + ~620 wordmark = 864; left = (1200-864)/2 = 168 -->
  <g transform="translate(168, 46)">
    <!-- Logo: Profile Stack -->
    <rect width="212" height="212" rx="52" fill="#0F2744"/>
    <rect x="52"  y="52"  width="108" height="30" rx="15" fill="#FFFFFF"/>
    <rect x="38"  y="97"  width="136" height="30" rx="15" fill="#22D3EE"/>
    <rect x="52"  y="142" width="108" height="30" rx="15" fill="#FFFFFF"/>

    <!-- Wordmark -->
    <g transform="translate(244, 0)" font-family="Poppins" font-weight="800" letter-spacing="0.5">
      <text x="0" y="72"  font-size="80" fill="#0F2744">AGENTIC</text>
      <text x="0" y="150" font-size="80" fill="#0F2744">DEVELOPMENT</text>
      <text x="0" y="228" font-size="80" fill="#22D3EE">STARTER KIT</text>
    </g>
  </g>

  <!-- ===== Tagline (centered, two lines) ===== -->
  <text x="600" y="328" text-anchor="middle" font-family="Poppins" font-weight="600" font-size="26" fill="#0F2744">Adopt agent skills, Cursor commands, and team profiles —</text>
  <text x="600" y="358" text-anchor="middle" font-family="Poppins" font-weight="600" font-size="26" fill="#0F2744">versioned in your repo.</text>

  <!-- ===== Feature row (centered on x=600) ===== -->
  <g transform="translate(600, 398)">
    <!-- dividers -->
    <g stroke="#D3D6DB" stroke-width="2">
      <line x1="-267" y1="8"  x2="-267" y2="138"/>
      <line x1="0"    y1="8"  x2="0"    y2="138"/>
      <line x1="267"  y1="8"  x2="267"  y2="138"/>
    </g>

    <!-- Col 1: Spec-driven workflow — Lucide file-stack -->
    <g transform="translate(-440, 4) scale(3.333)" fill="none" stroke="#0F2744" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 21a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-8a1 1 0 0 1 1-1"/>
      <path d="M16 16a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1"/>
      <path d="M21 6a2 2 0 0 0-.586-1.414l-2-2A2 2 0 0 0 17 2h-3a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1z"/>
    </g>
    <g transform="translate(-400, 0)" font-family="Poppins" font-weight="600" font-size="23" fill="#0F2744" text-anchor="middle">
      <text x="0" y="116">Spec-driven</text>
      <text x="0" y="146">workflow</text>
    </g>

    <!-- Col 2: Team profiles — Lucide layers-plus -->
    <g transform="translate(-173, 4) scale(3.333)" fill="none" stroke="#0F2744" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 .83.18 2 2 0 0 0 .83-.18l8.58-3.9a1 1 0 0 0 0-1.831z"/>
      <path d="M16 17h6"/>
      <path d="M19 14v6"/>
      <path d="M2 12a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 .825.178"/>
      <path d="M2 17a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l2.116-.962"/>
    </g>
    <g transform="translate(-133, 0)" font-family="Poppins" font-weight="600" font-size="23" fill="#0F2744" text-anchor="middle">
      <text x="0" y="116">Team</text>
      <text x="0" y="146">profiles</text>
    </g>

    <!-- Col 3: Cursor commands — Lucide square-slash -->
    <g transform="translate(93, 4) scale(3.333)" fill="none" stroke="#0F2744" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
      <rect width="18" height="18" x="3" y="3" rx="2"/>
      <line x1="9" x2="15" y1="15" y2="9"/>
    </g>
    <g transform="translate(133, 0)" font-family="Poppins" font-weight="600" font-size="23" fill="#0F2744" text-anchor="middle">
      <text x="0" y="116">Cursor</text>
      <text x="0" y="146">commands</text>
    </g>

    <!-- Col 4: Core agent skills — Lucide blocks -->
    <g transform="translate(360, 4) scale(3.333)" fill="none" stroke="#0F2744" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 22V7a1 1 0 0 0-1-1H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-5a1 1 0 0 0-1-1H2"/>
      <rect width="8" height="8" x="14" y="2" rx="1"/>
    </g>
    <g transform="translate(400, 0)" font-family="Poppins" font-weight="600" font-size="23" fill="#0F2744" text-anchor="middle">
      <text x="0" y="116">Core agent</text>
      <text x="0" y="146">skills</text>
    </g>
  </g>
</svg>
